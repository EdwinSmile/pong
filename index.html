<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <div class="player-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="player-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div class="instructions">
            <p><strong>Controls:</strong> Use Mouse Y position or Arrow Keys (UP/DOWN) to move the left paddle</p>
            <p>First to 10 points wins!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
